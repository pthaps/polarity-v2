<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Polarity AI — Options</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; margin: 24px; }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { margin-top: 16px; padding: 8px 16px; }
      p { color: #555; font-size: 14px; }
    </style>
  </head>
  <body>
    <h1>Polarity AI</h1>
    <p>Base URL of your Polarity web app (no trailing slash). The extension calls <code>/api/extension-analyze</code>.</p>
    <label for="apiBaseUrl">API base URL</label>
    <input id="apiBaseUrl" type="url" placeholder="https://your-app.vercel.app" />
    <button id="save">Save</button>
    <p id="status"></p>
    <script src="options.js"></script>
  </body>
</html>
